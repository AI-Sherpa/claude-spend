<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="56" y="56" width="400" height="400" rx="100" fill="url(#purpleGrad)" />

  <!-- Layered icon (3 stacked rectangles) -->
  <g transform="translate(256, 256)">
    <!-- Top layer -->
    <rect x="-80" y="-90" width="160" height="50" rx="8" fill="white" opacity="0.9" />

    <!-- Middle layer -->
    <rect x="-80" y="-20" width="160" height="50" rx="8" fill="white" opacity="0.7" />

    <!-- Bottom layer -->
    <rect x="-80" y="50" width="160" height="50" rx="8" fill="white" opacity="0.5" />
  </g>
</svg>